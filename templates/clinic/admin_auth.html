{% extends "base.html" %}
{% block title %}Clinic Admin · ClinicOS{% endblock %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
  <div style="width:100%;max-width:380px;">

    <div class="card" style="padding:36px 32px;text-align:center;">

      <div style="margin-bottom:20px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
             style="color:var(--muted);">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <h2 style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
                 color:var(--text);margin:0 0 6px;">Clinic Admin</h2>
      <p style="font-size:13px;color:var(--muted);margin:0 0 24px;">
        Enter your account password to continue
      </p>

      {% if auth_error %}
      <div class="alert alert-error" style="margin-bottom:16px;text-align:left;">
        Incorrect password · try again.
      </div>
      {% endif %}

      <form method="POST" action="/clinic/admin/auth">
        <div class="form-group" style="margin-bottom:16px;text-align:left;">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input"
                 placeholder="Your login password" autofocus autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Unlock</button>
      </form>

      <a href="/dashboard" style="display:block;margin-top:16px;font-size:12px;color:var(--dim);text-decoration:none;">
        ← Back to Dashboard
      </a>

    </div>
  </div>
</div>

{% endblock %}
