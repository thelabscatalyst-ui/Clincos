<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Required · ClinicOS</title>
  <link rel="stylesheet" href="/static/css/main.css?v=110" />
</head>
<body class="auth-body">

<div class="pin-screen">
  <div class="pin-card">

    <div class="pin-lock-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h2 class="pin-title">Doctor PIN Required</h2>
    <p class="pin-sub">This section is protected. Enter your PIN to continue.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/pin-prompt">
      <input type="hidden" name="next" value="{{ next_url }}" />
      <div class="form-group" style="margin-bottom:20px;">
        <input
          type="password"
          name="pin"
          id="pinInput"
          maxlength="6"
          placeholder="Enter PIN"
          inputmode="numeric"
          autocomplete="off"
          autofocus
          style="text-align:center;font-size:22px;letter-spacing:6px;"
        />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Unlock</button>
    </form>

    <p style="text-align:center;margin-top:28px;font-size:12px;color:var(--dim);">
      Not you? <a href="/logout" style="color:var(--muted);">Log out</a>
    </p>
  </div>
</div>

</body>
</html>
